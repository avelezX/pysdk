name: Store UVR Projection
run-name: UVR Projection & Implicit Inflation
on:
  workflow_dispatch:
  schedule:
    # UTC time — runs after TES/IBR collectors finish (14:30 UTC = 9:30 AM COT)
    - cron: '30 14 * * 1-5'
jobs:
  uvr_projection:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Calculate UVR Projection & Implicit Inflation
        working-directory: dm
        run: python3 run_collect_uvr_prints.py
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text":"❌ UVR Projection Collector failed: ${{ github.workflow }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
